{# base.htmlを継承 #}
{% extends "references/base.html" %}

{% block title %}
編集
{% endblock %}

{% block content %}

{# このページ固有の内容 #}

<div class="card">

    <h2>フローを編集する</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">

            <div class="form-row">
                <h3>フロー名</h3>
                {{ form.title }}
            </div>

            <div class="form-row">
                <h3>概要</h3>
                {{ form.description }}
            </div>

            <div class="form-row">
                <h3>step1</h3>
                {{ form.step1 }}
            </div>

            <div class="form-row">
                <h3>step2</h3>
                {{ form.step2 }}
            </div>

            <div class="form-row">
                <h3>step3</h3>
                {{ form.step3 }}
            </div>

            <div class="button-area">
                <button type="submit" class="button-primary">
                    更新する
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
