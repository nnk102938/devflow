{# base.htmlを継承 #}
{% extends "references/base.html" %}

{% block title %}
新規作成
{% endblock %}

{% block content %}

{# このページ固有の内容 #}

<div class="card">

    <h2>新しいフローを作成する</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">

            <div class="form-row">
                <h3>フロー名</h3>
                {{ form.title }}
            </div>

            <div class="form-row">
                <h3>概要</h3>
                {{ form.description }}
            </div>

            <div id="step-container" class="step-container">
                <div class="form-row step-item">
                    <h3>Step1</h3>

                    <div class="step-actions">
                        <button type="button" class="step-up">
                            <span class="material-symbols-outlined">
                                keyboard_arrow_up
                            </span>
                        </button>

                        <button type="button" class="step-down">
                            <span class="material-symbols-outlined">
                                keyboard_arrow_down
                            </span>
                        </button>

                        <button type="button" class="step-delete">
                            <span class="material-symbols-outlined">
                                delete
                            </span>
                        </button>
                    </div>

                    <select name="step_reference">
                        <option value="">選択してください</option>

                        {% for ref in references %}
                        <option value="{{ref.pk}}">
                            {{ ref.title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <button type="button" id="add-step" class="button-add">
                    ＋ Step追加
                </button>
            </div>

            <div class="button-area">
                <button type="submit" class="button-primary">
                    作成する
                </button>
            </div>

        </div>

    </form>

</div>
{% endblock %}

{% block script %}
<script>
    const container = document.getElementById("step-container");
    const button = document.getElementById("add-step");

    button.addEventListener("click", function () {

        // 最後のstepを取得
        const lastStep = container.lastElementChild;

        // 複製
        const newStep = lastStep.cloneNode(true);

        // step番号を更新
        const stepNumber = container.children.length + 1;
        newStep.querySelector("h3").textContent = `Step${stepNumber}`;

        // 選択をリセット
        newStep.querySelector("select").selectedIndex = 0;

        // 追加
        container.appendChild(newStep);
    });

    // 削除ボタン
    document.addEventListener("click", function (e) {

        const btn = e.target.closest(".step-delete");
        if (!btn) return;

        const steps = document.querySelectorAll(".step-item");

        if (steps.length === 1) {
            return;
        }

        btn.closest(".step-item").remove();

        renumberSteps();

    });

    // ↑ボタン
    document.addEventListener("click", function (e) {

        const btn = e.target.closest(".step-up");
        if (!btn) return;

        const step = btn.closest(".step-item");
        const prev = step.previousElementSibling;

        if (prev) {
            container.insertBefore(step, prev);
            renumberSteps();
        }
    });

    // ↓ボタン
    document.addEventListener("click", function (e) {

        const btn = e.target.closest(".step-down");
        if (!btn) return;

        const step = btn.closest(".step-item");
        const next = step.nextElementSibling;

        if (next) {
            container.insertBefore(next, step);
            renumberSteps();
        }
    });

    function renumberSteps() {

        document.querySelectorAll(".step-item h3")
            .forEach((h3, index) => {

                h3.textContent = `Step${index + 1}`;

            });

    }
</script>
{% endblock %}
